<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" role="img" aria-labelledby="title desc">
  <title id="title">MediChat Architecture Diagram</title>
  <desc id="desc">Architecture diagram for the MediChat multilingual medical information chatbot project.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8ff" />
      <stop offset="100%" stop-color="#eef5ff" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f9fbff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#b9c8e6" flood-opacity="0.35" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5873a6" />
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #22324f; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #55719c; }
      .section { font: 700 24px Arial, sans-serif; fill: #243755; }
      .box-title { font: 700 20px Arial, sans-serif; fill: #22324f; }
      .box-text { font: 500 16px Arial, sans-serif; fill: #384d73; }
      .small { font: 500 14px Arial, sans-serif; fill: #506789; }
      .tiny { font: 500 13px Arial, sans-serif; fill: #61789a; }
      .panel { fill: url(#panel); stroke: #c9d8ef; stroke-width: 2; rx: 26; }
      .box-blue { fill: #eef4ff; stroke: #8eb1f2; stroke-width: 2; rx: 18; }
      .box-green { fill: #edf9f2; stroke: #75c79d; stroke-width: 2; rx: 18; }
      .box-orange { fill: #fff4e9; stroke: #f0b06d; stroke-width: 2; rx: 18; }
      .box-violet { fill: #f5f0ff; stroke: #b59bed; stroke-width: 2; rx: 18; }
      .datastore { fill: #fdfefe; stroke: #7ea6d8; stroke-width: 2; }
      .connector { stroke: #5873a6; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .connector-dashed { stroke: #6b88b7; stroke-width: 3; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrow); }
      .divider { stroke: #d6e1f3; stroke-width: 2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="950" fill="url(#bg)" />

  <text x="80" y="70" class="title">MediChat Architecture Diagram</text>
  <text x="80" y="105" class="subtitle">Multilingual medical information chatbot for the PROG8245 and CSCN8010 final project</text>

  <rect x="50" y="140" width="300" height="620" class="panel" filter="url(#shadow)" />
  <text x="80" y="190" class="section">Front End / Client</text>

  <rect x="80" y="220" width="240" height="120" class="box-blue" />
  <text x="104" y="255" class="box-title">User</text>
  <text x="104" y="288" class="box-text">Students or demo audience</text>
  <text x="104" y="315" class="small">Ask health questions by text</text>
  <text x="104" y="338" class="small">or microphone input</text>

  <rect x="80" y="375" width="240" height="250" class="box-blue" />
  <text x="104" y="410" class="box-title">Gradio Web UI</text>
  <text x="104" y="442" class="box-text">`app.py`</text>
  <text x="104" y="472" class="small">Conversation window</text>
  <text x="104" y="496" class="small">History sidebar and turn details</text>
  <text x="104" y="520" class="small">Text composer and send action</text>
  <text x="104" y="544" class="small">Audio upload / microphone capture</text>
  <text x="104" y="568" class="small">Session-aware interaction flow</text>

  <rect x="80" y="655" width="240" height="70" class="box-orange" />
  <text x="104" y="697" class="box-title">Protocol</text>
  <text x="210" y="697" class="box-text">HTTP / WebSocket</text>

  <rect x="390" y="140" width="360" height="620" class="panel" filter="url(#shadow)" />
  <text x="420" y="190" class="section">Application / Middleware</text>

  <rect x="420" y="220" width="300" height="120" class="box-orange" />
  <text x="445" y="255" class="box-title">Request Orchestration</text>
  <text x="445" y="285" class="box-text">`app.py` event handlers</text>
  <text x="445" y="313" class="small">Queues text or audio input</text>
  <text x="445" y="336" class="small">Builds chat history and UI updates</text>

  <rect x="420" y="365" width="300" height="120" class="box-orange" />
  <text x="445" y="400" class="box-title">Session State</text>
  <text x="445" y="430" class="box-text">`session_id` and turn metadata</text>
  <text x="445" y="458" class="small">Loads history and keeps current context</text>

  <rect x="420" y="510" width="300" height="190" class="box-orange" />
  <text x="445" y="545" class="box-title">Routing Logic</text>
  <text x="445" y="575" class="box-text">Text path</text>
  <text x="560" y="575" class="box-text">or</text>
  <text x="595" y="575" class="box-text">Audio path</text>
  <text x="445" y="606" class="small">1. transcribe when audio is present</text>
  <text x="445" y="630" class="small">2. detect language and translate to English</text>
  <text x="445" y="654" class="small">3. call MediChat runtime engine</text>
  <text x="445" y="678" class="small">4. render multilingual response to the UI</text>

  <rect x="790" y="140" width="760" height="620" class="panel" filter="url(#shadow)" />
  <text x="820" y="190" class="section">Back End Services and Data Resources</text>

  <line x1="1165" y1="215" x2="1165" y2="735" class="divider" />
  <text x="840" y="225" class="subtitle">Runtime Services</text>
  <text x="1200" y="225" class="subtitle">Persistent Data and Model Assets</text>

  <rect x="830" y="245" width="290" height="95" class="box-green" />
  <text x="855" y="278" class="box-title">Speech-to-Text</text>
  <text x="855" y="307" class="box-text">`src/speech_to_text.py`</text>
  <text x="855" y="330" class="small">Transcribes microphone or uploaded audio</text>

  <rect x="830" y="360" width="290" height="115" class="box-green" />
  <text x="855" y="393" class="box-title">Language Detection and Translation</text>
  <text x="855" y="422" class="box-text">`src/translation.py`</text>
  <text x="855" y="445" class="small">Detects source language</text>
  <text x="855" y="468" class="small">Translates to and from English when needed</text>

  <rect x="830" y="495" width="290" height="105" class="box-green" />
  <text x="855" y="528" class="box-title">Dialogue Manager</text>
  <text x="855" y="557" class="box-text">`src/dialogue_manager.py`</text>
  <text x="855" y="580" class="small">Builds context for short follow-up questions</text>

  <rect x="830" y="620" width="290" height="105" class="box-green" />
  <text x="855" y="653" class="box-title">MediChat Engine</text>
  <text x="855" y="682" class="box-text">`src/predict.py`</text>
  <text x="855" y="705" class="small">Coordinates intent, retrieval, safety checks, and response flow</text>

  <rect x="1200" y="250" width="300" height="92" class="box-violet" />
  <text x="1225" y="283" class="box-title">Intent Classifier</text>
  <text x="1225" y="312" class="box-text">Classical ML model artifact</text>
  <text x="1225" y="335" class="small">Naive Bayes / Logistic Regression pipelines</text>

  <rect x="1200" y="360" width="300" height="92" class="box-violet" />
  <text x="1225" y="393" class="box-title">Knowledge Base</text>
  <text x="1225" y="422" class="box-text">`data/raw/medical_knowledge_base.json`</text>
  <text x="1225" y="445" class="small">Curated medical support snippets</text>

  <rect x="1200" y="470" width="300" height="92" class="box-violet" />
  <text x="1225" y="503" class="box-title">Fallback Responses</text>
  <text x="1225" y="532" class="box-text">`data/raw/intent_responses.json`</text>
  <text x="1225" y="555" class="small">Safe unsupported or low-confidence replies</text>

  <rect x="1200" y="580" width="300" height="92" class="box-violet" />
  <text x="1225" y="613" class="box-title">SQLite Session Store</text>
  <text x="1225" y="642" class="box-text">`data/medichat.sqlite3` via `src/database.py`</text>
  <text x="1225" y="665" class="small">Sessions, turns, language, confidence, retrieval metadata</text>

  <rect x="1200" y="690" width="300" height="92" class="box-violet" />
  <text x="1225" y="723" class="box-title">Evaluation Artifacts</text>
  <text x="1225" y="752" class="box-text">Metrics tables and confusion matrices</text>
  <text x="1225" y="775" class="small">Used for project validation and presentation</text>

  <rect x="820" y="790" width="730" height="120" class="panel" filter="url(#shadow)" />
  <text x="850" y="833" class="section">Offline ML Pipeline</text>
  <text x="850" y="867" class="box-text">`src/data_processing.py` -> `src/train.py` -> `src/evaluate.py` -> model artifacts used by the runtime intent classifier</text>

  <path d="M 320 280 C 350 280, 360 280, 390 280" class="connector" />
  <path d="M 320 500 C 350 500, 360 500, 390 500" class="connector" />
  <path d="M 350 690 C 370 690, 370 690, 390 690" class="connector" />

  <path d="M 720 280 C 760 280, 770 280, 830 280" class="connector" />
  <path d="M 720 425 C 760 425, 770 425, 830 425" class="connector" />
  <path d="M 720 605 C 760 605, 770 605, 830 605" class="connector" />

  <path d="M 975 340 L 975 360" class="connector" />
  <path d="M 975 475 L 975 495" class="connector" />
  <path d="M 975 600 L 975 620" class="connector" />

  <path d="M 1120 670 C 1160 670, 1160 626, 1200 626" class="connector" />
  <path d="M 1120 660 C 1160 660, 1160 296, 1200 296" class="connector" />
  <path d="M 1120 666 C 1160 666, 1160 406, 1200 406" class="connector" />
  <path d="M 1120 672 C 1160 672, 1160 516, 1200 516" class="connector" />

  <path d="M 1180 850 C 1180 815, 1250 796, 1250 782" class="connector-dashed" />

  <text x="510" y="725" class="tiny">Runtime flow: user input -> preprocessing -> contextual intent prediction -> retrieval-grounded response -> translation back -> UI + logging</text>
</svg>
