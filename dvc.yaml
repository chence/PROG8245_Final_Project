stages:
  prepare:
    cmd: ./.venv/bin/python -m src.data_processing --data-path ${prepare.data_path} --train-out ${prepare.train_out} --test-out ${prepare.test_out} --summary-out ${prepare.summary_out} --test-size ${prepare.test_size}
    deps:
      - src/data_processing.py
      - src/config.py
      - src/utils.py
      - ${prepare.data_path}
    params:
      - prepare
    outs:
      - ${prepare.train_out}
      - ${prepare.test_out}
      - ${prepare.summary_out}

  train:
    cmd: ./.venv/bin/python -m src.train --train-path ${train.train_path} --model-dir ${train.model_dir} --tfidf-max-features ${train.tfidf_max_features} --tfidf-ngram-max ${train.tfidf_ngram_max} --svd-components ${train.svd_components} --pca-components ${train.pca_components} --logistic-max-iter ${train.logistic_max_iter}
    deps:
      - src/train.py
      - src/config.py
      - src/utils.py
      - ${train.train_path}
    params:
      - train
    outs:
      - models/baseline_nb.joblib
      - models/svd_logreg.joblib
      - models/pca_logreg.joblib
      - models/baseline_nb.metadata.json
      - models/svd_logreg.metadata.json
      - models/pca_logreg.metadata.json
      - models/training_summary.json

  evaluate:
    cmd: ./.venv/bin/python -m src.evaluate --test-path ${evaluate.test_path} --model-dir ${evaluate.model_dir}
    deps:
      - src/evaluate.py
      - src/config.py
      - ${evaluate.test_path}
      - models/baseline_nb.joblib
      - models/svd_logreg.joblib
      - models/pca_logreg.joblib
    params:
      - evaluate
    metrics:
      - documentation/evaluation_metrics.json
    outs:
      - documentation/model_comparison.csv
      - documentation/model_comparison.md
      - documentation/confusion_matrix_baseline_nb.png
      - documentation/confusion_matrix_svd_logreg.png
      - documentation/confusion_matrix_pca_logreg.png
